<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animation Logo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#06133a;
    overflow:hidden;
}

/* Halo lumineux */
.glow{
    position:absolute;
    width:350px;
    height:350px;
    border-radius:50%;
    background:radial-gradient(
        circle,
        rgba(255,80,0,0.25) 0%,
        rgba(255,80,0,0.08) 40%,
        transparent 70%
    );
    animation:pulse 2s infinite;
}

.logo-container{
    position:relative;
    z-index:2;
}

.logo{
    width:220px;
    opacity:0;
    transform:scale(0.4);
    filter:
        drop-shadow(0 0 5px #ff3c00)
        drop-shadow(0 0 15px #ff3c00)
        drop-shadow(0 0 30px #ff3c00);
    animation:logoReveal 2s ease forwards;
}

@keyframes logoReveal{
    0%{
        opacity:0;
        transform:scale(0.2);
    }
    60%{
        opacity:1;
        transform:scale(1.15);
    }
    100%{
        opacity:1;
        transform:scale(1);
    }
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
        opacity:.7;
    }
    50%{
        transform:scale(1.2);
        opacity:1;
    }
}
</style>
</head>

<body>

<div class="glow"></div>

<div class="logo-container">
    <img src="images/logo.png" class="logo" alt="Logo">
</div>

</body>
</html>
